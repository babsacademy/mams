<!doctype html>
<html lang="fr">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Lookbook | Mams Store World</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;700&family=Playfair+Display:wght@500;600;700&display=swap" rel="stylesheet" />
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="assets/css/custom.css" />
  </head>
  <body class="bg-[#0d0d0d] text-white">
    <div data-component="navbar"></div>

    <main class="mx-auto max-w-7xl px-4 sm:px-6 lg:px-8">
      <section class="pt-14 pb-12 text-center">
        <p class="label-caps text-[#c9a96e]">Editorial collection</p>
        <h1 class="font-display text-6xl mt-3">Lookbook</h1>
        <p class="text-white/70 mt-4">Before / After et inspirations beauté pour votre prochaine transformation.</p>
      </section>

      <section class="pb-16">
        <h2 class="font-display text-4xl mb-6">Avant / Après</h2>
        <div class="compare-slider rounded-2xl border border-white/10 h-80 bg-[#121212]" data-compare>
          <div class="h-full relative overflow-hidden">
            <img src="assets/images/prod.png" alt="Avant transformation" class="h-full w-full object-cover object-center grayscale brightness-75" />
            <div class="absolute inset-0 bg-black/20"></div>
          </div>
          <div class="compare-after h-full" data-compare-after>
            <div class="h-full relative overflow-hidden">
              <img src="assets/images/prod.png" alt="Après transformation" class="h-full w-full object-cover object-center" />
            </div>
          </div>
          <button class="compare-handle" data-compare-handle>↔</button>
        </div>
        <div class="grid gap-5 md:grid-cols-3 mt-6">
          <div class="rounded-2xl border border-white/10 p-3">
            <div class="rounded-xl h-52 overflow-hidden border border-white/10">
              <img src="assets/images/prod.png" alt="Natural Glow" class="h-full w-full object-cover object-center" />
            </div>
            <p class="mt-3 label-caps text-[#c9a96e]">Natural Glow</p>
          </div>
          <div class="rounded-2xl border border-white/10 p-3">
            <div class="rounded-xl h-52 overflow-hidden border border-white/10">
              <img src="assets/images/prod.png" alt="Soft Glam" class="h-full w-full object-cover object-center" />
            </div>
            <p class="mt-3 label-caps text-[#c9a96e]">Soft Glam</p>
          </div>
          <div class="rounded-2xl border border-white/10 p-3">
            <div class="rounded-xl h-52 overflow-hidden border border-white/10">
              <img src="assets/images/prod.png" alt="Luxury Waves" class="h-full w-full object-cover object-center" />
            </div>
            <p class="mt-3 label-caps text-[#c9a96e]">Luxury Waves</p>
          </div>
        </div>
      </section>

      <section class="pb-16">
        <h2 class="font-display text-4xl mb-6">Galerie Lookbook</h2>
        <div class="masonry">
          <div class="masonry-item"><div class="rounded-2xl h-56 overflow-hidden border border-white/10"><img src="assets/images/prod.png" alt="Lookbook 1" class="h-full w-full object-cover object-center" /></div></div>
          <div class="masonry-item"><div class="rounded-2xl h-72 overflow-hidden border border-white/10"><img src="assets/images/prod.png" alt="Lookbook 2" class="h-full w-full object-cover object-center" /></div></div>
          <div class="masonry-item"><div class="rounded-2xl h-80 overflow-hidden border border-white/10"><img src="assets/images/prod.png" alt="Lookbook 3" class="h-full w-full object-cover object-center" /></div></div>
          <div class="masonry-item"><div class="rounded-2xl h-64 overflow-hidden border border-white/10"><img src="assets/images/prod.png" alt="Lookbook 4" class="h-full w-full object-cover object-center" /></div></div>
          <div class="masonry-item"><div class="rounded-2xl h-72 overflow-hidden border border-white/10"><img src="assets/images/prod.png" alt="Lookbook 5" class="h-full w-full object-cover object-center" /></div></div>
          <div class="masonry-item"><div class="rounded-2xl h-56 overflow-hidden border border-white/10"><img src="assets/images/prod.png" alt="Lookbook 6" class="h-full w-full object-cover object-center" /></div></div>
          <div class="masonry-item"><div class="rounded-2xl h-80 overflow-hidden border border-white/10"><img src="assets/images/prod.png" alt="Lookbook 7" class="h-full w-full object-cover object-center" /></div></div>
          <div class="masonry-item"><div class="rounded-2xl h-64 overflow-hidden border border-white/10"><img src="assets/images/prod.png" alt="Lookbook 8" class="h-full w-full object-cover object-center" /></div></div>
          <div class="masonry-item"><div class="rounded-2xl h-72 overflow-hidden border border-white/10"><img src="assets/images/prod.png" alt="Lookbook 9" class="h-full w-full object-cover object-center" /></div></div>
          <div class="masonry-item"><div class="rounded-2xl h-56 overflow-hidden border border-white/10"><img src="assets/images/prod.png" alt="Lookbook 10" class="h-full w-full object-cover object-center" /></div></div>
          <div class="masonry-item"><div class="rounded-2xl h-64 overflow-hidden border border-white/10"><img src="assets/images/prod.png" alt="Lookbook 11" class="h-full w-full object-cover object-center" /></div></div>
          <div class="masonry-item"><div class="rounded-2xl h-80 overflow-hidden border border-white/10"><img src="assets/images/prod.png" alt="Lookbook 12" class="h-full w-full object-cover object-center" /></div></div>
        </div>
      </section>

      <section class="pb-20">
        <h2 class="font-display text-4xl mb-6">Styles du moment</h2>
        <div class="grid gap-6 md:grid-cols-3">
          <article class="rounded-2xl border border-white/10 p-3 hover-lift">
            <div class="rounded-xl h-72 overflow-hidden border border-white/10">
              <img src="assets/images/prod.png" alt="Sleek Luxe" class="h-full w-full object-cover object-center" />
            </div>
            <h3 class="font-display text-2xl mt-4">Sleek Luxe</h3>
          </article>
          <article class="rounded-2xl border border-white/10 p-3 hover-lift">
            <div class="rounded-xl h-72 overflow-hidden border border-white/10">
              <img src="assets/images/prod.png" alt="Volume Queen" class="h-full w-full object-cover object-center" />
            </div>
            <h3 class="font-display text-2xl mt-4">Volume Queen</h3>
          </article>
          <article class="rounded-2xl border border-white/10 p-3 hover-lift">
            <div class="rounded-xl h-72 overflow-hidden border border-white/10">
              <img src="assets/images/prod.png" alt="Golden Glam" class="h-full w-full object-cover object-center" />
            </div>
            <h3 class="font-display text-2xl mt-4">Golden Glam</h3>
          </article>
        </div>
      </section>
    </main>

    <div data-component="footer"></div>
    <div data-component="whatsapp-float"></div>

    <script src="assets/js/main.js"></script>
    <script>
      const compare = document.querySelector("[data-compare]");
      const compareAfter = document.querySelector("[data-compare-after]");
      const handle = document.querySelector("[data-compare-handle]");
      if (compare && compareAfter && handle) {
        const updatePosition = (clientX) => {
          const rect = compare.getBoundingClientRect();
          const x = Math.max(0, Math.min(clientX - rect.left, rect.width));
          const percent = (x / rect.width) * 100;
          compareAfter.style.width = `${percent}%`;
          handle.style.left = `${percent}%`;
        };
        let dragging = false;
        handle.addEventListener("mousedown", () => (dragging = true));
        window.addEventListener("mouseup", () => (dragging = false));
        window.addEventListener("mousemove", (event) => {
          if (!dragging) return;
          updatePosition(event.clientX);
        });
        handle.addEventListener("touchstart", () => (dragging = true), { passive: true });
        window.addEventListener("touchend", () => (dragging = false), { passive: true });
        window.addEventListener("touchmove", (event) => {
          if (!dragging) return;
          updatePosition(event.touches[0].clientX);
        }, { passive: true });
      }
    </script>
  </body>
</html>
